name: Bridge Watchdog

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-bridge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check bridge heartbeat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          PING_MAX_AGE_MINUTES: ${{ secrets.PING_MAX_AGE_MINUTES }}
          ERROR_MESSAGE_TEMPLATE: ${{ secrets.ERROR_MESSAGE_TEMPLATE }}
          OK_MESSAGE_TEMPLATE: ${{ secrets.OK_MESSAGE_TEMPLATE }}
        run: python check_bridge.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet state.json; then
            echo "Nessuna modifica a state.json"
          else
            git add state.json
            git commit -m "Update watchdog state"
            git push
          fi
